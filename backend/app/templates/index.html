<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECS Command Center Test</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        form { margin-bottom: 2rem; border: 1px solid #ccc; padding: 1rem; border-radius: 4px; }
        input { margin: 0.5rem 0; display: block; padding: 0.5rem; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { background: #f8f9fa; margin: 0.5rem 0; padding: 0.5rem; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>User Management Test</h1>
    <form action="/test/add_user" method="POST">
        <label>Email: <input type="email" name="email" required></label>
        <label>First Name: <input type="text" name="first_name"></label>
        <label>Last Name: <input type="text" name="last_name"></label>
        <button type="submit">Add User</button>
    </form>
    
    <h2>Existing Users</h2>
    <ul>
        {% for user in users %}
            <li><strong>{{ user.email }}</strong> - {{ user.first_name }} {{ user.last_name }} ({{ user.system_role }})</li>
        {% else %}
            <li>No users found.</li>
        {% endfor %}
    </ul>
</body>
</html>
